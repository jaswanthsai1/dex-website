<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>loin Panel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Courier New', 'Monaco', monospace;
    }

    body {
      background: url('https://i.ibb.co.com/JFmY4dNW/IMG-20260223-130046-061.jpg') center center / cover no-repeat fixed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
      color: #0ff;
      text-shadow: 0 0 8px rgba(0, 255, 255, 0.7);
    }

    /* 🔥 BINARY RAIN */
    #matrixCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      opacity: 0.12;
    }

    /* HUD PANEL */
    .login-container {
      background: rgba(5, 10, 20, 0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 36px;
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 3;
      border: 1px solid rgba(0, 255, 255, 0.25);
      box-shadow: 
        0 0 25px rgba(0, 255, 255, 0.2),
        inset 0 0 20px rgba(0, 0, 0, 0.8);
      overflow: hidden;
    }

    /* SCAN LINES */
    .login-container::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 2px,
        rgba(0, 255, 255, 0.03) 2px,
        rgba(0, 255, 255, 0.03) 4px
      );
      pointer-events: none;
      z-index: 5;
    }

    /* STATUS BADGE */
    .status {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #0f0;
      z-index: 4;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #0f0;
      border-radius: 50%;
      box-shadow: 0 0 8px #0f0;
      animation: pulse 1.5s infinite;
    }

    .logo-title {
      font-size: 28px;
      font-weight: bold;
      text-align: center;
      margin: 0 0 28px;
      letter-spacing: 2px;
      color: #0ff;
      text-transform: uppercase;
      text-shadow: 0 0 15px rgba(0, 255, 255, 0.9);
      animation: glow 2s infinite alternate;
    }

    .welcome {
      text-align: center;
      margin-bottom: 28px;
    }

    .welcome h2 {
      font-size: 20px;
      margin-bottom: 6px;
      color: #fff;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
    }

    .welcome p {
      color: #0af;
      font-size: 14px;
    }

    .auth-toggle {
      display: flex;
      gap: 10px;
      margin-bottom: 26px;
    }

    .auth-toggle button {
      flex: 1;
      padding: 10px;
      border: 1px solid rgba(0, 255, 255, 0.3);
      background: rgba(0, 20, 30, 0.4);
      border-radius: 8px;
      color: #0ff;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .auth-toggle .active {
      background: rgba(0, 255, 255, 0.15);
      box-shadow: 0 0 12px rgba(0, 255, 255, 0.4);
    }

    .input-group {
      margin-bottom: 22px;
      position: relative;
    }

    .input-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #0af;
    }

    .input-group input {
      width: 100%;
      padding: 12px 14px 12px 46px;
      background: rgba(0, 10, 20, 0.6);
      border: 1px solid rgba(0, 255, 255, 0.2);
      border-radius: 8px;
      color: #0ff;
      font-family: 'Courier New', monospace;
      font-size: 15px;
      outline: none;
    }

    .input-group input:focus {
      border-color: #0ff;
      box-shadow: 0 0 0 3px rgba(0, 255, 255, 0.3);
    }

    .input-group i {
      position: absolute;
      left: 14px;
      top: 40px;
      color: #0af;
    }

    .submit-btn {
      width: 100%;
      padding: 13px;
      background: rgba(0, 10, 20, 0.7);
      border: 1px solid rgba(255, 0, 100, 0.6);
      border-radius: 8px;
      color: #f0f;
      font-family: 'Courier New', monospace;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s;
    }

    .submit-btn:hover {
      background: rgba(255, 0, 100, 0.2);
      box-shadow: 0 0 15px rgba(255, 0, 100, 0.6);
      transform: translateY(-2px);
    }

    .error {
      color: #f55;
      font-size: 13px;
      margin-top: 12px;
      min-height: 18px;
      text-align: center;
    }

    .help-section {
      text-align: center;
      margin-top: 24px;
    }

    .help-text {
      color: #0af;
      font-size: 13px;
    }

    .contact-buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 12px;
    }

    .contact-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      text-decoration: none;
      transition: transform 0.3s, box-shadow 0.3s;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .contact-btn:hover {
      transform: scale(1.2) rotate(10deg);
    }

    .whatsapp { background: rgba(37, 211, 102, 0.2); border-color: #25d366; }
    .telegram { background: rgba(33, 163, 221, 0.2); border-color: #21a3dd; }

    .footer {
      text-align: center;
      margin-top: 28px;
      color: #0af;
      font-size: 11px;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px rgba(0, 255, 255, 0.7); }
      to { text-shadow: 0 0 25px rgba(0, 255, 255, 1), 0 0 35px rgba(0, 255, 255, 0.8); }
    }

    @keyframes pulse {
      0% { opacity: 0.7; }
      50% { opacity: 1; }
      100% { opacity: 0.7; }
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 28px 20px;
      }
      .logo-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <!-- Binary Rain Canvas -->
  <canvas id="matrixCanvas"></canvas>

  <div class="login-container">
    <div class="status">
      <div class="status-dot"></div>
      <span>ONLINE</span>
    </div>

    <div class="logo-title">ACCESS  Panel</div>

    <div class="welcome">
      <h2>ACCESS GRANTED</h2>
      <p>Enter credentials to proceed</p>
    </div>

    <div class="auth-toggle">
      <button id="btn-signin" class="active">SIGN IN</button>
      <button id="btn-signup">SIGN UP</button>
    </div>

    <div class="input-group">
      <label>EMAIL</label>
      <i class="fas fa-user"></i>
      <input type="email" id="email" placeholder="user@gmail.com" autocomplete="email">
    </div>

    <div class="input-group">
      <label>PASSWORD</label>
      <i class="fas fa-key"></i>
      <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">
    </div>

    <button class="submit-btn" id="authBtn">AUTHENTICATE</button>
    <div class="error" id="errorMsg"></div>

    <div class="help-section">
      <div class="help-text">SYSTEM SUPPORT</div>
      <div class="contact-buttons">
        <a href="https://wa.me/YOUR_WHATSAPP_NUMBER" target="_blank" class="contact-btn whatsapp">
          <i class="fab fa-whatsapp"></i>
        </a>
        <a href="https://t.me/@EXUCODER" target="_blank" class="contact-btn telegram">
          <i class="fab fa-telegram-plane"></i>
        </a>
      </div>
    </div>

    <div class="footer">
      [SECURE] • Exu v1.0 • 2026
    </div>
  </div>

  <script>
    // 🔥 BINARY RAIN EFFECT
    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const chars = "01";
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = [];

    for (let i = 0; i < columns; i++) {
      drops[i] = Math.random() * -100;
    }

    function draw() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.04)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#00ffaa';
      ctx.font = `${fontSize}px monospace`;

      for (let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }

    setInterval(draw, 35);

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    // 🔥 FIREBASE AUTH
    const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456:web:abcdef"
        };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // DOM
    const btnSignin = document.getElementById('btn-signin');
    const btnSignup = document.getElementById('btn-signup');
    const authBtn = document.getElementById('authBtn');
    const errorMsg = document.getElementById('errorMsg');
    const email = document.getElementById('email');
    const password = document.getElementById('password');

    let isSignUp = false;

    btnSignup.addEventListener('click', () => {
      isSignUp = true;
      btnSignin.classList.remove('active');
      btnSignup.classList.add('active');
      authBtn.textContent = 'REGISTER';
    });

    btnSignin.addEventListener('click', () => {
      isSignUp = false;
      btnSignup.classList.remove('active');
      btnSignin.classList.add('active');
      authBtn.textContent = 'AUTHENTICATE';
      errorMsg.textContent = '';
    });

    authBtn.addEventListener('click', async () => {
      const emailVal = email.value.trim();
      const passVal = password.value;
      errorMsg.textContent = '';

      if (!emailVal || !passVal) {
        errorMsg.textContent = '[ERROR] FIELDS REQUIRED';
        return;
      }

      if (passVal.length < 6) {
        errorMsg.textContent = '[ERROR] MIN 6 CHAR PASSWORD';
        return;
      }

      try {
        if (isSignUp) {
          await auth.createUserWithEmailAndPassword(emailVal, passVal);
          alert('[SUCCESS] ACCOUNT CREATED');
        } else {
          await auth.signInWithEmailAndPassword(emailVal, passVal);
          alert('[SUCCESS] ACCESS GRANTED');
        }
      } catch (err) {
        if (err.code === 'auth/email-already-in-use') {
          errorMsg.textContent = '[ERROR] EMAIL IN USE';
        } else if (err.code === 'auth/invalid-email') {
          errorMsg.textContent = '[ERROR] INVALID EMAIL';
        } else if (err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found') {
          errorMsg.textContent = '[ERROR] ACCESS DENIED';
        } else {
          errorMsg.textContent = '[ERROR] SYSTEM FAILURE';
        }
      }
    });

    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') authBtn.click();
    });
  </script>
</body>
</html>
